  flutter:
    sdk: flutter

  cupertino_icons:  ^1.0.8
  onnxruntime: ^1.4.1
  image_picker: ^1.1.2
  flutter_vector_icons: ^2.0.0
  flutter_svg: ^2.0.7
  google_fonts: ^6.2.1
  gap: ^3.0.1
  logger: ^2.5.0
  shared_preferences: ^2.3.3
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^14.8.0
  collection: ^1.19.1
  flutter_riverpod: ^2.6.1
  json_annotation: ^4.9.0
  dio: ^5.8.0+1
  uuid: ^4.5.1
  get: ^4.7.2
  password_strength_checker: ^1.2.4
  url_launcher: ^6.3.1
  docx_viewer: ^0.2.1
  intl: ^0.20.2
  font_awesome_flutter: ^10.8.0
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^5.2.1
  photo_manager: ^3.7.1
  permission_handler: ^12.0.0+1

  video_player: ^2.10.0
  flutter_rating_stars: ^1.1.0
  exif: ^3.3.0
  masonry_grid: ^1.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  app_links: ^6.4.0
  flutter_randomcolor: ^1.0.18
  loading_animation_widget: ^1.3.0
  flutter_mentions: ^2.0.1
  flutter_animate: ^4.5.2
  flutter_custom_carousel: ^0.1.0+1
  provider: ^6.1.5+1
  fluentui_system_icons: ^1.1.273
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30
  pinput: ^6.0.2
  camera: 0.11.0
  image: ^4.8.0
  video_thumbnail: ^0.5.6
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  json_serializable: ^6.9.4

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/models/best.onnx
    - assets/models/labels.txt
    - assets/models/roboflow_10class.onnx
    - assets/models/roboflow_10class_labels.txt

  # To add assets to your application, add an assets section, like this:
